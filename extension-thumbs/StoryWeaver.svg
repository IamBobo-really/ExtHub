<svg xmlns="http://www.w3.org/2000/svg" width="309" height="160" viewBox="0 0 309 160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#203f6b"/>
      <stop offset="100%" stop-color="#4c97ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="309" height="160" fill="url(#bg)" rx="12" ry="12"/>

  <!-- Decorative shapes (gallery style) -->
  <circle cx="260" cy="40" r="12" fill="#4c97ff" stroke="#fff" stroke-width="3"/>
  <rect x="230" y="25" width="18" height="18" fill="#3373cc" stroke="#fff" stroke-width="3"/>
  <rect x="240" y="60" width="22" height="22" fill="#4c97ff" stroke="#fff" stroke-width="3"/>
  <polygon points="50,40 70,20 90,40 70,60" fill="#3373cc" stroke="#fff" stroke-width="3"/>
  <polygon points="60,80 75,65 90,80 75,95" fill="#4c97ff" stroke="#fff" stroke-width="3"/>

  <!-- Center open book icon -->
  <g transform="translate(100,35)">
    <path d="M0 10 Q40 -5 80 10 L80 90 Q40 75 0 90 Z" fill="#ffffff" stroke="#000000" stroke-width="2"/>
    <path d="M80 10 Q120 -5 160 10 L160 90 Q120 75 80 90 Z" fill="#ffffff" stroke="#000000" stroke-width="2"/>
    <line x1="80" y1="10" x2="80" y2="90" stroke="#000000" stroke-width="2"/>
  </g>

  <!-- Border outline -->
  <rect x="5" y="5" width="299" height="150" fill="none" stroke="#ffffff" stroke-width="8" rx="12" ry="12"/>
</svg>
